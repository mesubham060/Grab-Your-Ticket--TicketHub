<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Travel and Tourism Management</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-left">
      <h2>Reset Your Password</h2>
      <p>Enter your registered email to reset your password.</p>

      <form id="resetForm">
        <input type="email" id="resetEmail" placeholder="Enter your email" required>
        <input type="password" id="newPassword" placeholder="Enter new password" required>
        <button type="submit" class="login-btn">Reset Password</button>
      </form>

      <p class="signup-text"><a href="login.html">Back to Login</a></p>
    </div>

    <div class="login-right">
      <h3>Recover your access!</h3>
      <p>We’ll help you get back into your account.</p>
    </div>
  </div>

  <script>
    document.getElementById("resetForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("resetEmail").value;
      const newPassword = document.getElementById("newPassword").value;
      const storedEmail = localStorage.getItem("email");

      if (email === storedEmail) {
        localStorage.setItem("password", newPassword);
        alert("Password reset successful! You can now log in.");
        window.location.href = "login.css";
      } else {
        alert("Email not found!");
      }
    });
  </script>
</body>
</html>
