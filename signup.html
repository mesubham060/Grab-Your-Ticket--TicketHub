<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup | Travel and Tourism Management</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-left">
      <h2>Create a New Account</h2>
      <p>Fill in your details to sign up.</p>

      <form id="signupForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <button type="submit" class="login-btn">Sign Up</button>
      </form>

      <p class="signup-text">Already have an account? 
        <a href="login.html">Log in</a>
      </p>
    </div>

    <div class="login-right">
      <h3>Join the journey today!</h3>
      <p>Discover amazing destinations and travel experiences.</p>
    </div>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      // Save user credentials locally (simulated)
      localStorage.setItem("name", name);
      localStorage.setItem("email", email);
      localStorage.setItem("password", password);
      alert("Account created successfully!");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
